version: "3.9"
services:
  db:
    image: postgres:15
    environment:
  
      POSTGRES_USER: rails_user
      POSTGRES_PASSWORD: rails_pass
      POSTGRES_DB: invoice_dev    
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -b 0.0.0.0"
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://rails_user:rails_pass@db:5432/invoice_dev
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      RAILS_ENV: development
      RACK_ENV: development

  sidekiq:
    build: .
    command:  bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://rails_user:rails_pass@db:5432/invoice_dev

volumes:
  db_data: